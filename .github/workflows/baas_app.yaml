name: baas app ci/cd


on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean

  push:
    branches:
      - main
    paths:
      - '.github/workflows/baas_app.yaml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/BAASResources.cmake'
      - 'cmake/BAASDependency.cmake'
      - 'cmake/BAASConanRuntime.cmake'
      - 'cmake/BAASTarget.cmake'
      - 'deploy/conan/**'
      - 'resources.lock.json'
      - 'scripts/fetch_resources.py'
      - 'tests/docs/test_baas_app_ci.py'
      - 'tests/docs/test_external_resource_boundary.py'
      - 'tests/build/external_resource_boundary/**'
      - 'apps/BAAS/**'
      - 'apps/ISA/**'
      - 'resource/**'
      - 'cmake/Version.cmake'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - 'docs/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_APP_BAAS: ON
  BAAS_CONAN_MSVC_VERSION: '195'


jobs:
  Windows-latest-cmake-x64:
    strategy:
      matrix:
        include:
          - BAAS_APP_USE_CUDA: ON
            CONAN_CUDA: 'True'
            BUILD_SUFFIX: '-cuda'
          - BAAS_APP_USE_CUDA: OFF
            CONAN_CUDA: 'False'
            BUILD_SUFFIX: ''
    name: 'Build Binary for Windows x64 / CUDA ${{ matrix.BAAS_APP_USE_CUDA }}'
    runs-on: windows-latest
    outputs:
      APP_VERSION: ${{ steps.save_version_to_env.outputs.APP_VERSION }}
    defaults:
      run:
        working-directory: baas
    steps:
      - name: Clone Source Repo
        id: checkout_main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: "baas"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Conan and Ninja
        run: python -m pip install --disable-pip-version-check conan==2.30.0 ninja==1.11.1.1

      - name: Setup MSVC Dev Cmd   # Setup Developer Command Prompt for Microsotf Visual C++
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64

      - name: Verify dependency workflow metadata
        run: python -B -m unittest tests.docs.test_baas_app_ci -v

      - name: Export pinned private recipes
        run: python deploy/conan/scripts/manage_recipes.py export

      - name: Install Conan dependency graph
        run: >-
          conan install deploy/conan
          -of "build/conan/windows-msvc-release-baas${{ matrix.BUILD_SUFFIX }}"
          -pr:h=deploy/conan/profiles/windows-msvc-release
          -pr:h=deploy/conan/profiles/dependency-versions-default
          -pr:b=deploy/conan/profiles/windows-msvc-release
          -pr:b=deploy/conan/profiles/dependency-versions-default
          -o "&:onnxruntime_use_cuda=${{ matrix.CONAN_CUDA }}"
          -o "&:use_ffmpeg=True"
          -o "&:use_benchmark=True"
          -o "&:use_opencv_dnn=False"
          -o "&:use_libsodium=False"
          -o "&:use_libgit2=False"
          -c:a tools.build:jobs=4
          --build=missing

      - name: Build
        id: cmake_build
        run: |
          Write-Output "::group::Generate CUDA ${{ matrix.BAAS_APP_USE_CUDA }}"
          cmake -S . -B "build/conan-windows-msvc-release-baas${{ matrix.BUILD_SUFFIX }}" "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/baas/build/conan/windows-msvc-release-baas${{ matrix.BUILD_SUFFIX }}/generators/conan_toolchain.cmake" -DBUILD_APP_BAAS=${{ env.BUILD_APP_BAAS }} -DBUILD_APP_ISA=OFF -DBUILD_BAAS_OCR=OFF -DBUILD_BAAS_AW_CHECKER=OFF -DBAAS_APP_USE_CUDA=${{ matrix.BAAS_APP_USE_CUDA }} -DBAAS_FETCH_RESOURCES=ON -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G Ninja
          Write-Output "::endgroup::"
          Write-Output "::group::Build"
          cmake --build "build/conan-windows-msvc-release-baas${{ matrix.BUILD_SUFFIX }}" --config Release --parallel 4 --target BAAS_APP
          Write-Output "::endgroup::"

      - name: Save Version To Env
        id: save_version_to_env
        working-directory: baas/build/conan-windows-msvc-release-baas${{ matrix.BUILD_SUFFIX }}
        run: | 
          $APP_VERSION = Get-Content -Path "BAAS_APP_version.txt" -TotalCount 1
          Add-Content -Path $env:GITHUB_OUTPUT -Value "APP_VERSION=$APP_VERSION"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          path: baas/build/conan-windows-msvc-release-baas${{ matrix.BUILD_SUFFIX }}/bin
          name: baas-app-bin-windows-x64-CUDA-${{ matrix.BAAS_APP_USE_CUDA }}

  legacy-resource-profile-smoke:
    name: 'Validate legacy resource profiles (including ISA)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: baas

      - name: Configure offline legacy resource gates
        working-directory: baas
        run: >-
          python -B -m unittest
          tests.docs.test_external_resource_boundary.ExternalResourceBoundaryTests.test_every_legacy_command_and_preset_declares_the_full_profile
          tests.docs.test_external_resource_boundary.ExternalResourceDeclarationHarnessTests
          -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - Windows-latest-cmake-x64
      - legacy-resource-profile-smoke
    permissions:
      contents: write
      actions: write
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}

    steps:
      # - name: Determine Tag Name
      #   id: determine_tag_name
      #   run: | 
      #     VERSION=$(tr -d '\n' < apps/BAAS/CMakeLists.txt | grep -oP 'project\s*\([^)]*VERSION\s+\K[\d.]+')
      #     echo "Detected project version: $VERSION"
      #     echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download Artifact
        id: download_artifact
        uses: actions/download-artifact@v4

      - name: Zip Artifact
        id: zip_artifact
        run: |
          tree -d -L 2
          zip -r baas-app-bin-windows-x64-cuda.zip baas-app-bin-windows-x64-CUDA-ON/
          zip -r baas-app-bin-windows-x64.zip baas-app-bin-windows-x64-CUDA-OFF/
  
      - name: Release Artifact
        id: release_artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.Windows-latest-cmake-x64.outputs.APP_VERSION }}
          files: |
            baas-app-bin-windows-x64-cuda.zip
            baas-app-bin-windows-x64.zip
          generate_release_notes: true
          make_latest: true

      - name: Trigger MirrorChyanUploading
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_uploading
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
