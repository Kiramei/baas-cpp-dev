name: baas ocr ci/cd


on: 
  workflow_dispatch: # allow manual triggering
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - '.github/workflows/baas_ocr.yaml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'deploy/conan/**'
      - 'include/**'
      - 'src/**'
      - 'resources.lock.json'
      - 'scripts/fetch_resources.py'
      - 'scripts/dev/Build-AndroidOcr.ps1'
      - 'scripts/dev/Enter-WindowsDevShell.ps1'
      - 'tests/docs/test_external_resource_boundary.py'
      - 'tests/docs/test_legacy_conan_workflows.py'
      - 'tests/build/external_resource_boundary/**'
      - 'apps/ocr_server/**'
      - 'resource/**'
  pull_request:
    branches: 
      - main
    types: 
      - opened
      - synchronize
      - reopened
    paths:
      - '.github/workflows/baas_ocr.yaml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'deploy/conan/**'
      - 'include/**'
      - 'src/**'
      - 'resources.lock.json'
      - 'scripts/fetch_resources.py'
      - 'scripts/dev/Build-AndroidOcr.ps1'
      - 'scripts/dev/Enter-WindowsDevShell.ps1'
      - 'tests/docs/test_external_resource_boundary.py'
      - 'tests/docs/test_legacy_conan_workflows.py'
      - 'tests/build/external_resource_boundary/**'
      - 'apps/ocr_server/**'
      - 'resource/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true


permissions:
  contents: write # for creating release


env:
  BUILD_TYPE: Release
  BUILD_BAAS_OCR: ON


jobs:
  Ubuntu-latest-cmake-x64:
    name: 'Build Binary for Linux x64'
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./baas_cpp
    steps:
      - name: Clone Source Repo
        id: checkout_main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: "baas_cpp"

      - name: Clone Prebuild Repo
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        id: checkout_prebuild
        uses: actions/checkout@v4
        with:
          repository: "pur1fying/BAAS_Cpp_prebuild"
          ref: "linux-x64"
          token: ${{ secrets.GHA_TOKEN_SECRET }}
          fetch-depth: 0
          path: "prebuild"

      - name: Install Build Dependencies
        id: install_build_depends
        run: |
          sudo apt-get update
          sudo apt-get install build-essential

      - name: Install GCC 13
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install g++-13 -y
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Check GCC Version
        run: g++ --version

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Conan client
        run: python -m pip install --disable-pip-version-check conan==2.30.0

      - name: Generate pinned Conan dependencies
        run: |
          python deploy/conan/scripts/manage_recipes.py export \
            --only baas-opencv \
            --only baas-onnxruntime \
            --only baas-nlohmann-json \
            --only baas-cpp-httplib \
            --only baas-spdlog \
            --only baas-simdutf
          conan create deploy/conan/recipes/baas-cpp-httplib \
            -pr:h=deploy/conan/profiles/linux-gcc-release \
            -pr:b=deploy/conan/profiles/linux-gcc-release \
            --build=missing
          conan install deploy/conan \
            -of build/conan/linux-gcc-release-ocr \
            -pr:h=deploy/conan/profiles/linux-gcc-release \
            -pr:h=deploy/conan/profiles/dependency-versions-default \
            -pr:b=deploy/conan/profiles/linux-gcc-release \
            -o "&:dependency_set=ocr" \
            -o "&:onnxruntime_use_cuda=False" \
            -o "&:use_ffmpeg=False" \
            -o "&:use_benchmark=False" \
            --build=missing \
            --no-remote

      - name: Build
        id: cmake_build
        run: |
          echo "::group::Generate makefile"
          cmake -S . -B build \
            "-DCMAKE_TOOLCHAIN_FILE=${GITHUB_WORKSPACE}/baas_cpp/build/conan/linux-gcc-release-ocr/generators/conan_toolchain.cmake" \
            -DBUILD_APP_BAAS=OFF \
            -DBUILD_APP_ISA=OFF \
            -DBUILD_BAAS_OCR=ON \
            -DBUILD_BAAS_AW_CHECKER=OFF \
            -DBAAS_FETCH_RESOURCES=ON \
            -DBAAS_OCR_SERVER_USE_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=Release
          echo "::endgroup::"
          echo "::group::Build"
          cmake --build build --config Release --parallel $(nproc)
          echo "::endgroup::"

      - name: Install Python
        id: install_python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Test Dependencies
        id: install_test_depends 
        run: |
          if ${{ steps.install_python.outputs.cache-hit }} ;  then echo "::notice::Hitting pip cache, using cached packages may lead to issues.";  fi 
          python -m pip install --upgrade pip
          python -m pip install -r apps/ocr_server/test/requirements.txt
      
      - name: Run Test
        id: run_test
        run: |
          python -m unittest discover -s apps/ocr_server/test -p "*.py"
          rm -r -f ./build/bin/output
          rm -r -f ./build/bin/config

      - name: Upload Artifacts
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          path: ./baas_cpp/build/bin
          name: baas-ocr-bin-ubuntu-x64

      - name: Copy Binaries
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        working-directory: ./prebuild
        id: copy_bin
        run: |
          cp -a -f ../baas_cpp/build/bin/* .

      - name: Commit and Push
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        working-directory: ./prebuild
        continue-on-error: true
        id: commit_and_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "New version pushed

          commit sha: ${{ github.sha }}
          commit msg: ${{ github.event.head_commit.message }}
          trigger: ${{ github.workflow }} (event: ${{ github.event_name }})
          build bot: ${{ github.job }} (run id: ${{ github.run_id }})"
          git push


