  Windows-latest-cmake-x64:
    name: 'Build Binary for Windows x64'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./baas_cpp
    steps:
      - name: Clone Source Repo
        id: checkout_main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: "baas_cpp"

      - name: Clone Prebuild Repo
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        id: checkout_prebuild
        uses: actions/checkout@v4
        with:
          repository: "pur1fying/BAAS_Cpp_prebuild"
          ref: "windows-x64"
          token: ${{ secrets.GHA_TOKEN_SECRET }}
          fetch-depth: 0
          path: "prebuild"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Conan and Ninja
        run: python -m pip install --disable-pip-version-check conan==2.30.0 ninja==1.11.1.1

      - name: Setup MSVC Dev Cmd   # Setup Developer Command Prompt for Microsotf Visual C++
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64

      - name: Generate pinned Conan dependencies
        run: |
          python deploy/conan/scripts/manage_recipes.py export `
            --only baas-opencv `
            --only baas-onnxruntime `
            --only baas-nlohmann-json `
            --only baas-cpp-httplib `
            --only baas-spdlog `
            --only baas-simdutf
          conan create deploy/conan/recipes/baas-cpp-httplib `
            -pr:h=deploy/conan/profiles/windows-msvc-release `
            -pr:b=deploy/conan/profiles/windows-msvc-release `
            --build=missing
          conan install deploy/conan `
            -of build/conan/windows-msvc-release-ocr `
            -pr:h=deploy/conan/profiles/windows-msvc-release `
            -pr:h=deploy/conan/profiles/dependency-versions-default `
            -pr:b=deploy/conan/profiles/windows-msvc-release `
            -o "&:dependency_set=ocr" `
            -o "&:onnxruntime_use_cuda=False" `
            -o "&:use_ffmpeg=False" `
            -o "&:use_benchmark=False" `
            --build=missing `
            --no-remote

      - name: CMake Configure and Build
        id: cmake_configure_and_build
        run: |
          Write-Output "::group::Generate makefile"
          cmake -S . -B build `
            "-DCMAKE_TOOLCHAIN_FILE=$env:GITHUB_WORKSPACE\baas_cpp\build\conan\windows-msvc-release-ocr\generators\conan_toolchain.cmake" `
            -DBUILD_APP_BAAS=OFF `
            -DBUILD_APP_ISA=OFF `
            -DBUILD_BAAS_OCR=ON `
            -DBUILD_BAAS_AW_CHECKER=OFF `
            -DBAAS_FETCH_RESOURCES=ON `
            -DBAAS_OCR_SERVER_USE_CUDA=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -G Ninja
          Write-Output "::endgroup::"
          Write-Output "::group::Build"
          cmake --build build --config Release --parallel 4
          Write-Output "::endgroup::"

      - name: Install Python
        id: install_python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
  
      - name: Install Test Dependencies
        id: install_test_depends 
        run: |
          if ('${{ steps.install_python.outputs.cache-hit }}' -eq 'true') {Write-Output "::notice::Hitting pip cache, using cached packages may lead to issues."}
          python -m pip install --upgrade pip
          python -m pip install -r apps/ocr_server/test/requirements.txt
      
      - name: Run Test
        id: run_test
        run: |
          python -m unittest discover -s .\apps\ocr_server\test -p "*.py"
          Remove-Item -Path ".\build\bin\output" -Recurse -Force
          Remove-Item -Path ".\build\bin\config" -Recurse -Force

      - name: Upload Artifacts
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          path: ./baas_cpp/build/bin
          name: baas-ocr-bin-windows-x64

      - name: Copy Binaries
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        working-directory: ./prebuild
        id: copy_bin
        run: |
          Copy-Item -Path "..\baas_cpp\build\bin\*" -Destination . -Recurse -Force

      - name: Commit and Push
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        working-directory: ./prebuild
        continue-on-error: true
        id: commit_and_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "New version pushed

          commit sha: ${{ github.sha }}
          commit msg: ${{ github.event.head_commit.message }}
          trigger: ${{ github.workflow }} (event: ${{ github.event_name }})
          build bot: ${{ github.job }} (run id: ${{ github.run_id }})"
          git push   
  Android-lib:
    strategy:
      matrix:
        target_arch: [arm64-v8a, x86_64]
    name: Build Android lib (${{ matrix.target_arch }})
    runs-on: windows-latest
    steps:
      - name: Clone Source Repo
        id: checkout_main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: "baas_cpp"

      - name: Clone Prebuild Repo
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        id: checkout_prebuild
        uses: actions/checkout@v4
        with:
          repository: "pur1fying/BAAS_Cpp_prebuild"
          ref: android-${{ matrix.target_arch }}
          token: ${{ secrets.GHA_TOKEN_SECRET }}
          fetch-depth: 0
          path: "prebuild"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Android NDK
        shell: pwsh
        run: |
          $androidSdk = if ($env:ANDROID_SDK_ROOT) {
            $env:ANDROID_SDK_ROOT
          } elseif ($env:ANDROID_HOME) {
            $env:ANDROID_HOME
          } else {
            throw 'Neither ANDROID_SDK_ROOT nor ANDROID_HOME is set.'
          }
          $sdkmanager = Join-Path $androidSdk 'cmdline-tools\latest\bin\sdkmanager.bat'
          if (-not (Test-Path -LiteralPath $sdkmanager -PathType Leaf)) {
            throw "Could not find sdkmanager at $sdkmanager."
          }
          & $sdkmanager "--sdk_root=$androidSdk" 'ndk;29.0.13846066'
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not install Android NDK 29.0.13846066.'
          }
          $ndk = Join-Path $androidSdk 'ndk\29.0.13846066'
          if (-not (Test-Path -LiteralPath $ndk -PathType Container)) {
            throw "Could not find Android NDK 29.0.13846066 at $ndk."
          }
          "ANDROID_NDK_HOME=$ndk" >> $env:GITHUB_ENV

      - name: Create repository Python environment
        working-directory: ./baas_cpp
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install `
            --disable-pip-version-check conan==2.30.0 ninja==1.11.1.1

      - name: Build and verify Android OCR library
        working-directory: ./baas_cpp
        shell: pwsh
        run: |
          .\scripts\dev\Build-AndroidOcr.ps1 `
            -Abi '${{ matrix.target_arch }}' `
            -Jobs 4 `
            -NdkPath $env:ANDROID_NDK_HOME
      
      - name: Upload Artifacts
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          path: ./baas_cpp/build/conan-android-clang-release-ocr-${{ matrix.target_arch }}/bin/lib/${{ matrix.target_arch }}
          name: baas-ocr-android-lib-${{ matrix.target_arch }}

      - name: Copy Binaries
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        working-directory: ./prebuild
        id: copy_bin
        run: |
          Copy-Item -Path "..\baas_cpp\build\conan-android-clang-release-ocr-${{ matrix.target_arch }}\bin\lib\${{ matrix.target_arch }}\*" -Destination . -Recurse -Force

      - name: Commit and Push
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}
        working-directory: ./prebuild
        continue-on-error: true
        id: commit_and_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "New version pushed

          commit sha: ${{ github.sha }}
          commit msg: ${{ github.event.head_commit.message }}
          trigger: ${{ github.workflow }} (event: ${{ github.event_name }})
          build bot: ${{ github.job }} (run id: ${{ github.run_id }})"
          git push
