name: Foundation runtime CI

# This is a focused host foundation gate. Android, sanitizers, fuzzing, live
# service sockets, and full application/OCR builds remain separate future gates.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/foundation-runtime.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'include/script/**'
      - 'src/script/**'
      - 'tests/script/**'
      - 'include/service/**'
      - 'src/service/**'
      - 'tests/service/**'
      - 'scripts/service_contract/**'
      - 'tests/service_contract/**'
      - 'docs/script-runtime/ADR-0001-runtime-architecture.md'
      - 'docs/script-runtime/ADR-0002-vm-memory-management.md'
      - 'docs/script-runtime/LANGUAGE_SPEC_DRAFT.md'
      - 'docs/script-runtime/SERVICE_COMPATIBILITY.md'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '.github/workflows/foundation-runtime.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'include/script/**'
      - 'src/script/**'
      - 'tests/script/**'
      - 'include/service/**'
      - 'src/service/**'
      - 'tests/service/**'
      - 'scripts/service_contract/**'
      - 'tests/service_contract/**'
      - 'docs/script-runtime/ADR-0001-runtime-architecture.md'
      - 'docs/script-runtime/ADR-0002-vm-memory-management.md'
      - 'docs/script-runtime/LANGUAGE_SPEC_DRAFT.md'
      - 'docs/script-runtime/SERVICE_COMPATIBILITY.md'

permissions:
  contents: read

concurrency:
  group: foundation-runtime-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  host-foundation:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        build_type:
          - Debug
          - Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python for service vectors
        if: matrix.build_type == 'Debug'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install service-vector dependencies
        if: matrix.build_type == 'Debug'
        run: python -m pip install --disable-pip-version-check cryptography PyNaCl

      - name: Report bundled toolchain
        run: |
          cmake --version
          ctest --version

      # No -G is intentional: official Windows images select their installed
      # Visual Studio generator; Ubuntu/macOS select bundled Unix Makefiles.
      - name: Configure foundation targets
        run: cmake -S . -B build/foundation -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTING=ON -DBUILD_SCRIPT_TESTS=ON -DBUILD_SERVICE_PROTOCOL_TESTS=ON -DBUILD_APP_BAAS=OFF -DBUILD_APP_ISA=OFF -DBUILD_BAAS_OCR=OFF -DBUILD_BAAS_AW_CHECKER=OFF -DBUILD_BAAS_NMS_BENCHMARK=OFF -DBAAS_FETCH_RESOURCES=OFF

      - name: Build foundation tests
        run: cmake --build build/foundation --config ${{ matrix.build_type }} --parallel 4 --target BAAS_script_lexer_tests BAAS_script_parser_tests BAAS_script_semantic_tests BAAS_script_executor_tests BAAS_service_pipe_framing_tests

      - name: Run foundation tests
        run: ctest --test-dir build/foundation --build-config ${{ matrix.build_type }} --output-on-failure --timeout 120

      - name: Verify checked-in service vectors
        if: matrix.build_type == 'Debug'
        run: python -m unittest discover -s tests/service_contract -p "test_*.py" -v
