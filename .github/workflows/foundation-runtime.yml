name: Foundation runtime CI

# This is a focused host foundation gate. Android, sanitizers, fuzzing, live
# service sockets, and full application/OCR builds remain separate future gates.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/foundation-runtime.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'include/script/**'
      - 'src/script/**'
      - 'apps/script_check/**'
      - 'tests/script/**'
      - 'include/service/**'
      - 'src/service/**'
      - 'tests/service/**'
      - 'scripts/service_contract/**'
      - 'scripts/platform/**'
      - 'scripts/dev/**'
      - 'tests/service_contract/**'
      - 'scripts/migration/**'
      - 'tests/platform/**'
      - 'tests/docs/**'
      - 'docs/script-runtime/ADR-0001-runtime-architecture.md'
      - 'docs/script-runtime/ADR-0002-vm-memory-management.md'
      - 'docs/script-runtime/ADR-0003-privileged-operation-boundaries.md'
      - 'docs/script-runtime/ADR-0004-core-runtime-boundary.md'
      - 'docs/script-runtime/LANGUAGE_SPEC_DRAFT.md'
      - 'docs/script-runtime/LANGUAGE_GRAMMAR.md'
      - 'docs/script-runtime/VALUE_SEMANTICS.md'
      - 'docs/script-runtime/CONTROL_FLOW_AND_MODULES.md'
      - 'docs/script-runtime/ERRORS_AND_CLEANUP.md'
      - 'docs/script-runtime/ASYNC_TASKS.md'
      - 'docs/script-runtime/HOST_CAPABILITY_CONTRACTS.md'
      - 'docs/script-runtime/LOG_HOST.md'
      - 'docs/script-runtime/host-capabilities.v1.json'
      - 'docs/script-runtime/evidence/operation-index.json'
      - 'docs/script-runtime/MIGRATION_MATRIX.md'
      - 'docs/script-runtime/SERVICE_COMPATIBILITY.md'
      - 'docs/script-runtime/SERVICE_PROTOCOL_V1.md'
      - 'docs/script-runtime/PLATFORM_SMOKE_PREREQUISITES.md'
      - 'docs/script-runtime/evidence/platform_smoke_prerequisites.windows.json'
      - 'docs/DEVELOPMENT_ENVIRONMENT.md'
      - 'docs/script-runtime/PYTHON_GOLDEN_TRACES.md'
      - 'docs/script-runtime/evidence/python-golden-traces.json'
      - 'docs/script-runtime/PYTHON_SERVICE_PERFORMANCE_BASELINE.md'
      - 'docs/script-runtime/evidence/python-service-performance-baseline.json'
      - 'docs/script-runtime/SERVICE_ROUTER_CORE.md'
      - 'docs/script-runtime/SERVICE_TRIGGER_SESSION.md'
      - 'docs/script-runtime/SERVICE_HEALTH_READINESS.md'
      - 'docs/script-runtime/SERVICE_HTTPLIB_ADAPTER.md'
      - 'docs/script-runtime/SERVICE_ORIGIN_POLICY.md'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '.github/workflows/foundation-runtime.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'include/script/**'
      - 'src/script/**'
      - 'apps/script_check/**'
      - 'tests/script/**'
      - 'include/service/**'
      - 'src/service/**'
      - 'tests/service/**'
      - 'scripts/service_contract/**'
      - 'scripts/platform/**'
      - 'scripts/dev/**'
      - 'tests/service_contract/**'
      - 'scripts/migration/**'
      - 'tests/platform/**'
      - 'tests/docs/**'
      - 'docs/script-runtime/ADR-0001-runtime-architecture.md'
      - 'docs/script-runtime/ADR-0002-vm-memory-management.md'
      - 'docs/script-runtime/ADR-0003-privileged-operation-boundaries.md'
      - 'docs/script-runtime/ADR-0004-core-runtime-boundary.md'
      - 'docs/script-runtime/LANGUAGE_SPEC_DRAFT.md'
      - 'docs/script-runtime/LANGUAGE_GRAMMAR.md'
      - 'docs/script-runtime/VALUE_SEMANTICS.md'
      - 'docs/script-runtime/CONTROL_FLOW_AND_MODULES.md'
      - 'docs/script-runtime/ERRORS_AND_CLEANUP.md'
      - 'docs/script-runtime/ASYNC_TASKS.md'
      - 'docs/script-runtime/HOST_CAPABILITY_CONTRACTS.md'
      - 'docs/script-runtime/LOG_HOST.md'
      - 'docs/script-runtime/host-capabilities.v1.json'
      - 'docs/script-runtime/evidence/operation-index.json'
      - 'docs/script-runtime/MIGRATION_MATRIX.md'
      - 'docs/script-runtime/SERVICE_COMPATIBILITY.md'
      - 'docs/script-runtime/SERVICE_PROTOCOL_V1.md'
      - 'docs/script-runtime/PLATFORM_SMOKE_PREREQUISITES.md'
      - 'docs/script-runtime/evidence/platform_smoke_prerequisites.windows.json'
      - 'docs/DEVELOPMENT_ENVIRONMENT.md'
      - 'docs/script-runtime/PYTHON_GOLDEN_TRACES.md'
      - 'docs/script-runtime/evidence/python-golden-traces.json'
      - 'docs/script-runtime/PYTHON_SERVICE_PERFORMANCE_BASELINE.md'
      - 'docs/script-runtime/evidence/python-service-performance-baseline.json'
      - 'docs/script-runtime/SERVICE_ROUTER_CORE.md'
      - 'docs/script-runtime/SERVICE_TRIGGER_SESSION.md'
      - 'docs/script-runtime/SERVICE_HEALTH_READINESS.md'
      - 'docs/script-runtime/SERVICE_HTTPLIB_ADAPTER.md'
      - 'docs/script-runtime/SERVICE_ORIGIN_POLICY.md'

permissions:
  contents: read

concurrency:
  group: foundation-runtime-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  host-foundation:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        build_type:
          - Debug
          - Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python for service vectors
        if: matrix.build_type == 'Debug'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install service-vector dependencies
        if: matrix.build_type == 'Debug'
        run: python -m pip install --disable-pip-version-check cryptography PyNaCl

      - name: Report bundled toolchain
        run: |
          cmake --version
          ctest --version

      # No -G is intentional: official Windows images select their installed
      # Visual Studio generator; Ubuntu/macOS select bundled Unix Makefiles.
      - name: Configure foundation targets
        run: cmake -S . -B build/foundation -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTING=ON -DBUILD_SCRIPT_TESTS=ON -DBUILD_SCRIPT_TOOLS=ON -DBUILD_SERVICE_PROTOCOL_TESTS=ON -DBUILD_SERVICE_ROUTER_TESTS=ON -DBUILD_SERVICE_ORIGIN_POLICY_TESTS=ON -DBUILD_APP_BAAS=OFF -DBUILD_APP_ISA=OFF -DBUILD_BAAS_OCR=OFF -DBUILD_BAAS_AW_CHECKER=OFF -DBUILD_BAAS_NMS_BENCHMARK=OFF -DBAAS_FETCH_RESOURCES=OFF

      - name: Build foundation tests
        run: cmake --build build/foundation --config ${{ matrix.build_type }} --parallel 4 --target BAAS_script_check BAAS_script_lexer_tests BAAS_script_parser_tests BAAS_script_semantic_tests BAAS_script_executor_tests BAAS_script_value_heap_tests BAAS_script_structured_error_heap_tests BAAS_script_error_envelope_tests BAAS_script_environment_tests BAAS_script_error_translation_tests BAAS_script_syntax_check_tests BAAS_script_json_bridge_tests BAAS_script_module_specifier_tests BAAS_script_module_graph_tests BAAS_script_host_registry_tests BAAS_script_sync_evaluator_tests BAAS_script_sync_host_tests BAAS_script_sync_host_evaluator_tests BAAS_script_log_host_tests BAAS_service_pipe_framing_tests BAAS_service_router_tests BAAS_service_health_foundation_tests BAAS_service_origin_policy_tests

      - name: Run foundation tests
        run: ctest --test-dir build/foundation --build-config ${{ matrix.build_type }} --output-on-failure --timeout 120

      - name: Verify checked-in service vectors
        if: matrix.build_type == 'Debug'
        run: python -m unittest discover -s tests/service_contract -p "test_*.py" -v

      - name: Verify migration and baseline tools
        if: matrix.build_type == 'Debug'
        run: python -B -m unittest discover -s scripts/migration/tests -p "test_*.py" -v

      - name: Verify platform prerequisite checker and sanitized evidence
        if: matrix.build_type == 'Debug'
        run: python -m unittest discover -s tests/platform -p "test_*.py" -v

      - name: Verify normative script specifications
        if: matrix.build_type == 'Debug'
        run: python -B -m unittest discover -s tests/docs -p "test_*.py" -v
