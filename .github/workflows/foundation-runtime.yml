permissions:
  contents: read

concurrency:
  group: foundation-runtime-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  host-foundation:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        build_type:
          - Debug
          - Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python for service vectors
        if: matrix.build_type == 'Debug'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install service-vector dependencies
        if: matrix.build_type == 'Debug'
        run: python -m pip install --disable-pip-version-check cryptography PyNaCl

      - name: Report bundled toolchain
        run: |
          cmake --version
          ctest --version

      # No -G is intentional: official Windows images select their installed
      # Visual Studio generator; Ubuntu/macOS select bundled Unix Makefiles.
      - name: Configure foundation targets
        run: cmake -S . -B build/foundation -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTING=ON -DBUILD_SCRIPT_TESTS=ON -DBUILD_SCRIPT_TOOLS=ON -DBUILD_RESOURCE_CORE_TESTS=ON -DBUILD_RUNTIME_REPOSITORY_TESTS=ON -DBUILD_RUNTIME_REPOSITORY_UPDATER_TESTS=ON -DBUILD_SCRIPT_RESOURCE_HOST_TESTS=ON -DBUILD_SERVICE_PROTOCOL_TESTS=ON -DBUILD_SERVICE_TRIGGER_CATALOG_TESTS=ON -DBUILD_SERVICE_TRIGGER_DISPATCH_TESTS=ON -DBUILD_SERVICE_TRIGGER_EXECUTOR_TESTS=ON -DBUILD_SERVICE_PIPE_HOST_TESTS=ON -DBUILD_SERVICE_TRIGGER_PIPE_CHANNEL_TESTS=ON -DBUILD_SERVICE_ROUTER_TESTS=ON -DBUILD_SERVICE_ORIGIN_POLICY_TESTS=ON -DBUILD_SERVICE_ADB_DISCOVERY_TRIGGER_TESTS=ON -DBUILD_SERVICE_ADB_TRANSPORT_TESTS=ON -DBUILD_SERVICE_ADB_SYNC_TESTS=ON -DBUILD_SERVICE_COMMAND_LINE_TESTS=ON -DBUILD_SERVICE_SHUTDOWN_COORDINATOR_TESTS=ON -DBUILD_SERVICE_STATUS_TRIGGER_TESTS=ON -DBUILD_APP_BAAS=OFF -DBUILD_APP_ISA=OFF -DBUILD_BAAS_OCR=OFF -DBUILD_BAAS_AW_CHECKER=OFF -DBUILD_BAAS_NMS_BENCHMARK=OFF -DBAAS_FETCH_RESOURCES=OFF

      - name: Build foundation tests
        run: cmake --build build/foundation --config ${{ matrix.build_type }} --parallel 4 --target BAAS_script_check BAAS_script_run BAAS_resource_snapshot_tests BAAS_runtime_repository_tests BAAS_runtime_repository_updater_tests BAAS_script_resource_host_tests BAAS_script_lexer_tests BAAS_script_parser_tests BAAS_script_semantic_tests BAAS_script_executor_tests BAAS_script_value_heap_tests BAAS_script_structured_error_heap_tests BAAS_script_error_envelope_tests BAAS_script_environment_tests BAAS_script_error_translation_tests BAAS_script_syntax_check_tests BAAS_script_json_bridge_tests BAAS_script_module_specifier_tests BAAS_script_module_graph_tests BAAS_script_host_registry_tests BAAS_script_sync_evaluator_tests BAAS_script_sync_host_tests BAAS_script_sync_host_evaluator_tests BAAS_script_typed_host_handle_tests BAAS_script_log_host_tests BAAS_service_pipe_framing_tests BAAS_service_pipe_host_tests BAAS_service_trigger_pipe_channel_tests BAAS_service_trigger_session_tests BAAS_service_trigger_egress_tests BAAS_service_trigger_envelope_tests BAAS_service_trigger_ingress_tests BAAS_service_trigger_catalog_tests BAAS_service_trigger_dispatch_tests BAAS_service_trigger_executor_tests BAAS_service_router_tests BAAS_service_health_foundation_tests BAAS_service_origin_policy_tests BAAS_service_adb_discovery_trigger_tests BAAS_service_adb_transport_tests BAAS_service_adb_sync_tests BAAS_service_command_line_tests BAAS_service_shutdown_coordinator_tests BAAS_service_status_trigger_tests

      - name: Run foundation tests
        run: ctest --test-dir build/foundation --build-config ${{ matrix.build_type }} --output-on-failure --timeout 120

      - name: Verify checked-in service vectors
        if: matrix.build_type == 'Debug'
        run: python -m unittest discover -s tests/service_contract -p "test_*.py" -v

      - name: Verify migration and baseline tools
        if: matrix.build_type == 'Debug'
        run: python -B -m unittest discover -s scripts/migration/tests -p "test_*.py" -v

      - name: Verify platform prerequisite checker and sanitized evidence
        if: matrix.build_type == 'Debug'
        run: python -m unittest discover -s tests/platform -p "test_*.py" -v

      - name: Verify normative script specifications
        if: matrix.build_type == 'Debug'
        run: python -B -m unittest discover -s tests/docs -p "test_*.py" -v

  android-runtime-repository:
    name: Android updater ${{ matrix.abi }} / Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install pinned Android NDK
        shell: bash
        run: |
          android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${android_sdk}" ]]; then
            echo 'Neither ANDROID_SDK_ROOT nor ANDROID_HOME is set.' >&2
            exit 1
          fi
          sdkmanager="${android_sdk}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "${sdkmanager}" ]]; then
            echo "Could not find executable sdkmanager at ${sdkmanager}." >&2
            exit 1
          fi
          "${sdkmanager}" --sdk_root="${android_sdk}" 'ndk;29.0.13846066'
          test -d "${android_sdk}/ndk/29.0.13846066"
          echo "ANDROID_NDK_HOME=${android_sdk}/ndk/29.0.13846066" >> "$GITHUB_ENV"

      - name: Configure Android updater
        shell: bash
        run: >-
          cmake -S . -B build/runtime-repository-android-${{ matrix.abi }}
          -G Ninja
          "-DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake"
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-26
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_RUNTIME_REPOSITORY_UPDATER=ON
          -DBUILD_APP_BAAS=OFF
          -DBUILD_APP_ISA=OFF
          -DBUILD_BAAS_OCR=OFF
          -DBUILD_BAAS_AW_CHECKER=OFF
          -DBUILD_BAAS_NMS_BENCHMARK=OFF
          -DBAAS_FETCH_RESOURCES=OFF

      - name: Cross-build Android updater
        shell: bash
        run: >-
          cmake --build build/runtime-repository-android-${{ matrix.abi }}
          --config Release
          --parallel 4
          --target BAAS_runtime_repository_updater
