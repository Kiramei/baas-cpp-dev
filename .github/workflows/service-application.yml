name: Service application

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/service-application.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'apps/BAAS_service/**'
      - 'include/service/**'
      - 'include/runtime/repository/RuntimeRepositorySnapshot.h'
      - 'include/runtime/repository/RuntimeRepositoryReadView.h'
      - 'include/scheduler/**'
      - 'src/service/**'
      - 'src/runtime/repository/RuntimeRepositorySnapshot.cpp'
      - 'src/runtime/repository/RuntimeRepositoryReadView.cpp'
      - 'src/runtime/repository/RuntimeRepositoryReadViewInternal.h'
      - 'src/runtime/repository/RuntimeRepositoryTreeFormat.cpp'
      - 'src/runtime/repository/RuntimeRepositoryTreeFormat.h'
      - 'src/scheduler/**'
      - 'tests/scheduler/**'
      - 'tests/docs/test_scheduler_policy.py'
      - 'tests/service/**'
      - 'src/service/adapters/ConfigArchiveCodec.h'
      - 'src/service/adapters/ConfigArchiveCodec.cpp'
      - 'tests/service/ServiceApplicationTests.cpp'
      - 'tests/service/FileResourceStoreTests.cpp'
      - 'tests/service/ConfigArchiveCodecTests.cpp'
      - 'tests/service/ConfigurationTriggerRegistrationTests.cpp'
      - 'tests/service/AdbDiscoveryTriggerRegistrationTests.cpp'
      - 'tests/service/ServiceRuntimeProviderBridgeTests.cpp'
      - 'deploy/conan/conanfile.py'
      - 'deploy/conan/profiles/**'
      - 'deploy/conan/scripts/**'
      - 'deploy/conan/recipes/baas-libsodium/**'
      - 'deploy/conan/recipes/baas-cpp-httplib/**'
      - 'deploy/conan/recipes/baas-nlohmann-json/**'
      - 'deploy/conan/recipes/baas-miniz/**'
      - 'deploy/conan/recipes/baas-opencv/**'
      - 'docs/script-runtime/SERVICE_APPLICATION.md'
      - 'docs/script-runtime/SERVICE_FILE_RESOURCE_STORE.md'
      - 'docs/script-runtime/SERVICE_COMMAND_LINE.md'
      - 'docs/script-runtime/SERVICE_CONFIGURATION_TRIGGERS.md'
      - 'docs/script-runtime/SERVICE_RUNTIME_TASK_TRIGGERS.md'
      - 'docs/script-runtime/SERVICE_ADB_DISCOVERY_TRIGGER.md'
      - 'docs/script-runtime/SERVICE_RUNTIME_PROVIDER_BRIDGE.md'
      - 'docs/script-runtime/SERVICE_RUNTIME_REPOSITORY_OWNER.md'
      - 'docs/script-runtime/RUNTIME_REPOSITORIES.md'
      - 'docs/scheduler/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/service-application.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'apps/BAAS_service/**'
      - 'include/service/**'
      - 'include/runtime/repository/RuntimeRepositorySnapshot.h'
      - 'include/runtime/repository/RuntimeRepositoryReadView.h'
      - 'include/scheduler/**'
      - 'src/service/**'
      - 'src/runtime/repository/RuntimeRepositorySnapshot.cpp'
      - 'src/runtime/repository/RuntimeRepositoryReadView.cpp'
      - 'src/runtime/repository/RuntimeRepositoryReadViewInternal.h'
      - 'src/runtime/repository/RuntimeRepositoryTreeFormat.cpp'
      - 'src/runtime/repository/RuntimeRepositoryTreeFormat.h'
      - 'src/scheduler/**'
      - 'tests/scheduler/**'
      - 'tests/docs/test_scheduler_policy.py'
      - 'tests/service/**'
      - 'src/service/adapters/ConfigArchiveCodec.h'
      - 'src/service/adapters/ConfigArchiveCodec.cpp'
      - 'tests/service/ServiceApplicationTests.cpp'
      - 'tests/service/FileResourceStoreTests.cpp'
      - 'tests/service/ConfigArchiveCodecTests.cpp'
      - 'tests/service/ConfigurationTriggerRegistrationTests.cpp'
      - 'tests/service/AdbDiscoveryTriggerRegistrationTests.cpp'
      - 'tests/service/ServiceRuntimeProviderBridgeTests.cpp'
      - 'deploy/conan/conanfile.py'
      - 'deploy/conan/profiles/**'
      - 'deploy/conan/scripts/**'
      - 'deploy/conan/recipes/baas-libsodium/**'
      - 'deploy/conan/recipes/baas-cpp-httplib/**'
      - 'deploy/conan/recipes/baas-nlohmann-json/**'
      - 'deploy/conan/recipes/baas-miniz/**'
      - 'deploy/conan/recipes/baas-opencv/**'
      - 'docs/script-runtime/SERVICE_APPLICATION.md'
      - 'docs/script-runtime/SERVICE_FILE_RESOURCE_STORE.md'
      - 'docs/script-runtime/SERVICE_COMMAND_LINE.md'
      - 'docs/script-runtime/SERVICE_CONFIGURATION_TRIGGERS.md'
      - 'docs/script-runtime/SERVICE_RUNTIME_TASK_TRIGGERS.md'
      - 'docs/script-runtime/SERVICE_ADB_DISCOVERY_TRIGGER.md'
      - 'docs/script-runtime/SERVICE_RUNTIME_PROVIDER_BRIDGE.md'
      - 'docs/script-runtime/SERVICE_RUNTIME_REPOSITORY_OWNER.md'
      - 'docs/script-runtime/RUNTIME_REPOSITORIES.md'
      - 'docs/scheduler/**'

permissions:
  contents: read

concurrency:
  group: service-application-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  host-application:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: windows-latest
            build_type: Debug
            conan_settings: '-s:h compiler.runtime_type=Debug'
          - os: windows-latest
            build_type: Release
            conan_settings: '-s:h compiler.runtime_type=Release'
          - os: ubuntu-latest
            build_type: Debug
            conan_settings: ''
          - os: ubuntu-latest
            build_type: Release
            conan_settings: ''
          - os: macos-latest
            build_type: Debug
            conan_settings: ''
          - os: macos-latest
            build_type: Release
            conan_settings: ''

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Conan and Ninja
        run: python -m pip install --disable-pip-version-check conan==2.30.0 ninja==1.11.1.1

      - name: Detect host profile
        run: conan profile detect --force

      - name: Build pinned libsodium recipe
        run: >-
          conan create deploy/conan/recipes/baas-libsodium
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          ${{ matrix.conan_settings }} --build=missing --no-remote

      - name: Build pinned cpp-httplib recipe
        run: >-
          conan create deploy/conan/recipes/baas-cpp-httplib
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          ${{ matrix.conan_settings }} --build=missing

      - name: Build pinned nlohmann-json recipe
        run: >-
          conan create deploy/conan/recipes/baas-nlohmann-json
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          ${{ matrix.conan_settings }} --build=missing --no-remote

      - name: Build pinned miniz recipe
        run: >-
          conan create deploy/conan/recipes/baas-miniz
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          ${{ matrix.conan_settings }} --build=missing --no-remote

      - name: Generate default lightweight application dependencies
        run: >-
          conan install --requires=baas-libsodium/1.0.22
          --requires=baas-cpp-httplib/0.50.1
          --requires=baas-nlohmann-json/3.11.3
          --requires=baas-miniz/3.1.2
          -of build/conan/service-application-lightweight
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          ${{ matrix.conan_settings }}
          -g CMakeDeps -g CMakeToolchain --build=missing --no-remote

      - name: Configure default lightweight application without OpenCV
        run: >-
          cmake -S . -B build/service-application-lightweight
          "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/build/conan/service-application-lightweight/conan_toolchain.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_SERVICE_APP=ON
          -DBUILD_SERVICE_PRODUCTION_RUNTIME_SCRIPT_TASK_FACTORY=OFF
          -DBUILD_SERVICE_PRODUCTION_RUNTIME_TASK_CONTROL=OFF
          -DBUILD_APP_BAAS=OFF -DBUILD_APP_ISA=OFF -DBUILD_BAAS_OCR=OFF
          -DBUILD_BAAS_AW_CHECKER=OFF -DBUILD_BAAS_NMS_BENCHMARK=OFF
          -DBAAS_FETCH_RESOURCES=OFF

      - name: Build default lightweight application
        run: >-
          cmake --build build/service-application-lightweight
          --config ${{ matrix.build_type }} --parallel 4
          --target BAAS_service BAAS_service_application

      - name: Build pinned OpenCV recipe
        run: >-
          conan create deploy/conan/recipes/baas-opencv
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          -o:h "baas-opencv/*:shared=False"
          ${{ matrix.conan_settings }} --build=missing --no-remote

      - name: Generate application CMake dependencies
        run: >-
          conan install --requires=baas-libsodium/1.0.22
          --requires=baas-cpp-httplib/0.50.1
          --requires=baas-nlohmann-json/3.11.3
          --requires=baas-miniz/3.1.2
          --requires=baas-opencv/4.13.0
          -o:h "baas-opencv/*:shared=False"
          -of build/conan/service-application
          -s:h build_type=${{ matrix.build_type }} -s:b build_type=Release
          ${{ matrix.conan_settings }}
          -g CMakeDeps -g CMakeToolchain --build=missing --no-remote

      - name: Configure hook-free production application
        run: >-
          cmake -S . -B build/service-application
          "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/build/conan/service-application/conan_toolchain.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON -DBUILD_SERVICE_APP_TESTS=ON
          -DBUILD_SERVICE_PRODUCTION_RUNTIME_SCRIPT_TASK_FACTORY=ON
          -DBUILD_SERVICE_PRODUCTION_RUNTIME_TASK_CONTROL=ON
          -DBUILD_SERVICE_FILE_RESOURCE_STORE_TESTS=ON
          -DBUILD_SERVICE_CONFIGURATION_TRIGGER_TESTS=ON
          -DBUILD_SERVICE_RUNTIME_TASK_TRIGGER_TESTS=ON
          -DBUILD_SERVICE_ADB_DISCOVERY_TRIGGER_TESTS=ON
          -DBUILD_SERVICE_AUTH_OWNER_TESTS=ON
          -DBUILD_SERVICE_RUNTIME_PROVIDER_BRIDGE_TESTS=ON
          -DBUILD_SERVICE_RUNTIME_REPOSITORY_PLAN_TESTS=ON
          -DBUILD_SCHEDULER_POLICY_TESTS=ON
          -DBUILD_APP_BAAS=OFF -DBUILD_APP_ISA=OFF -DBUILD_BAAS_OCR=OFF
          -DBUILD_BAAS_AW_CHECKER=OFF -DBUILD_BAAS_NMS_BENCHMARK=OFF
          -DBAAS_FETCH_RESOURCES=OFF

      - name: Build executable and application tests
        run: >-
          cmake --build build/service-application
          --config ${{ matrix.build_type }} --parallel 4
          --target BAAS_service BAAS_service_application_tests
          BAAS_service_production_runtime_path_tests
          BAAS_service_file_resource_store_tests
          BAAS_service_config_archive_codec_tests
          BAAS_service_configuration_trigger_tests BAAS_service_auth_owner_tests
          BAAS_service_runtime_task_trigger_tests
          BAAS_service_adb_discovery_trigger_tests
          BAAS_service_runtime_provider_bridge_tests
          BAAS_service_runtime_repository_owner_tests
          BAAS_service_runtime_repository_plan_tests
          BAAS_scheduler_policy_tests

      - name: Run real loopback and CLI tests
        run: >-
          ctest --test-dir build/service-application
          --build-config ${{ matrix.build_type }} --output-on-failure --timeout 90
          -R "^(BAAS_service_(application_tests|production_runtime_path_tests|file_resource_store_tests|config_archive_codec_tests|configuration_trigger_tests|runtime_task_trigger_tests|adb_discovery_trigger_tests|auth_owner_tests|runtime_provider_bridge_tests|runtime_repository_owner_tests|runtime_repository_plan_tests|version_cli|help_cli|no_embedded_configuration_defaults)|BAAS_scheduler_policy_tests)$"

      - name: Verify scheduler CI contract
        run: python -m unittest discover -s tests/docs -p test_scheduler_policy.py

  android-scheduler-policy:
    name: Android service composition ${{ matrix.abi }} / Release compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - abi: arm64-v8a
            profile: android-clang-arm64-v8a-release
          - abi: x86_64
            profile: android-clang-x86_64-release

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned Android NDK
        shell: bash
        run: |
          android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${android_sdk}" ]]; then
            echo 'Neither ANDROID_SDK_ROOT nor ANDROID_HOME is set.' >&2
            exit 1
          fi
          sdkmanager="${android_sdk}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "${sdkmanager}" ]]; then
            echo "Could not find executable sdkmanager at ${sdkmanager}." >&2
            exit 1
          fi
          license_answers="$(printf 'y\n%.0s' {1..100})"
          "${sdkmanager}" --sdk_root="${android_sdk}" 'ndk;29.0.13846066' <<< "${license_answers}"
          test -d "${android_sdk}/ndk/29.0.13846066"
          echo "ANDROID_NDK_HOME=${android_sdk}/ndk/29.0.13846066" >> "$GITHUB_ENV"

      - name: Install pinned Conan client
        run: python -m pip install --disable-pip-version-check conan==2.30.0

      - name: Detect build profile
        run: conan profile detect --force

      - name: Cross-build pinned nlohmann-json recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-nlohmann-json
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing
          --no-remote

      - name: Cross-build pinned libsodium recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-libsodium
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing
          --no-remote

      - name: Cross-build pinned cpp-httplib recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-cpp-httplib
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing

      - name: Cross-build pinned miniz recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-miniz
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing
          --no-remote

      - name: Cross-build pinned OpenCV recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-opencv
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          -o:h "baas-opencv/*:shared=False"
          --build=missing
          --no-remote

      - name: Generate Android service dependencies
        shell: bash
        run: >-
          conan install --requires=baas-nlohmann-json/3.11.3
          --requires=baas-libsodium/1.0.22
          --requires=baas-cpp-httplib/0.50.1
          --requires=baas-miniz/3.1.2
          --requires=baas-opencv/4.13.0
          -o:h "baas-opencv/*:shared=False"
          -of build/conan/service-android-${{ matrix.abi }}
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          -g CMakeDeps
          -g CMakeToolchain
          --build=missing
          --no-remote

      - name: Configure Android service composition
        shell: bash
        run: >-
          cmake -S . -B build/service-android-${{ matrix.abi }}
          -G Ninja
          "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/build/conan/service-android-${{ matrix.abi }}/conan_toolchain.cmake"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SCHEDULER_POLICY=ON
          -DBUILD_SERVICE_APP=ON
          -DBUILD_SERVICE_PRODUCTION_RUNTIME_SCRIPT_TASK_FACTORY=ON
          -DBUILD_SERVICE_PRODUCTION_RUNTIME_TASK_CONTROL=ON
          -DBUILD_APP_BAAS=OFF
          -DBUILD_APP_ISA=OFF
          -DBUILD_BAAS_OCR=OFF
          -DBUILD_BAAS_AW_CHECKER=OFF
          -DBUILD_BAAS_NMS_BENCHMARK=OFF
          -DBAAS_FETCH_RESOURCES=OFF

      - name: Cross-build Android service composition
        shell: bash
        run: >-
          cmake --build build/service-android-${{ matrix.abi }}
          --config Release
          --parallel 4
          --target BAAS_scheduler_policy
          BAAS_service_application
          BAAS_service_production_runtime_task_control
          BAAS_service_production_runtime_script_task_factory
