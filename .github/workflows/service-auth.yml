permissions:
  contents: read

concurrency:
  group: service-auth-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  host-auth:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: windows-latest
            build_type: Debug
            conan_settings: '-s:h compiler.runtime_type=Debug'
          - os: windows-latest
            build_type: Release
            conan_settings: '-s:h compiler.runtime_type=Release'
          - os: ubuntu-latest
            build_type: Debug
            conan_settings: ''
          - os: ubuntu-latest
            build_type: Release
            conan_settings: ''
          - os: macos-latest
            build_type: Debug
            conan_settings: ''
          - os: macos-latest
            build_type: Release
            conan_settings: ''

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify ws-scrcpy resource lock
        run: python -B tests/docs/test_ws_scrcpy_resource_lock.py -v

      - name: Install pinned Conan and Ninja
        run: python -m pip install --disable-pip-version-check conan==2.30.0 ninja==1.11.1.1

      - name: Detect build profile
        run: conan profile detect --force

      - name: Build and verify pinned libsodium recipe
        run: >-
          conan create deploy/conan/recipes/baas-libsodium
          -s:h build_type=${{ matrix.build_type }}
          -s:b build_type=Release
          ${{ matrix.conan_settings }}
          --build=missing
          --no-remote

      - name: Build and verify pinned cpp-httplib recipe
        run: >-
          conan create deploy/conan/recipes/baas-cpp-httplib
          -s:h build_type=${{ matrix.build_type }}
          -s:b build_type=Release
          ${{ matrix.conan_settings }}
          --build=missing

      - name: Build and verify pinned nlohmann-json recipe
        run: >-
          conan create deploy/conan/recipes/baas-nlohmann-json
          -s:h build_type=${{ matrix.build_type }}
          -s:b build_type=Release
          ${{ matrix.conan_settings }}
          --build=missing
          --no-remote

      - name: Build and verify pinned miniz recipe
        run: >-
          conan create deploy/conan/recipes/baas-miniz
          -s:h build_type=${{ matrix.build_type }}
          -s:b build_type=Release
          ${{ matrix.conan_settings }}
          --build=missing
          --no-remote

      - name: Generate control-auth CMake dependencies
        run: >-
          conan install --requires=baas-libsodium/1.0.22
          --requires=baas-cpp-httplib/0.50.1
          --requires=baas-nlohmann-json/3.11.3
          --requires=baas-miniz/3.1.2
          -of build/conan/service-auth
          -s:h build_type=${{ matrix.build_type }}
          -s:b build_type=Release
          ${{ matrix.conan_settings }}
          -g CMakeDeps
          -g CMakeToolchain
          --build=missing
          --no-remote

      - name: Configure service authentication tests
        run: >-
          cmake -S . -B build/service-auth
          "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/build/conan/service-auth/conan_toolchain.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON
          -DBUILD_SERVICE_AUTH_CRYPTO_TESTS=ON
          -DBUILD_SERVICE_AUTH_OWNER_TESTS=ON
          -DBUILD_SERVICE_WEBSOCKET_TESTS=ON
          -DBUILD_SERVICE_CONTROL_SESSION_TESTS=ON
          -DBUILD_SERVICE_BUSINESS_SESSION_TESTS=ON
          -DBUILD_SERVICE_BUSINESS_PIPE_CHANNEL_TESTS=ON
          -DBUILD_SERVICE_TRIGGER_HANDLER_TESTS=ON
          -DBUILD_SERVICE_PROVIDER_BACKEND_TESTS=ON
          -DBUILD_SERVICE_REMOTE_BACKEND_TESTS=ON
          -DBUILD_SERVICE_REMOTE_BACKEND_LIVE_SMOKE=ON
          -DBUILD_SERVICE_REMOTE_HANDLER_TESTS=ON
          -DBUILD_SERVICE_ADB_TRANSPORT_TESTS=ON
          -DBUILD_SERVICE_ADB_SYNC_TESTS=ON
          -DBUILD_APP_BAAS=OFF
          -DBUILD_APP_ISA=OFF
          -DBUILD_BAAS_OCR=OFF
          -DBUILD_BAAS_AW_CHECKER=OFF
          -DBUILD_BAAS_NMS_BENCHMARK=OFF
          -DBAAS_FETCH_RESOURCES=OFF

      - name: Build service authentication tests
        run: >-
          cmake --build build/service-auth
          --config ${{ matrix.build_type }}
          --parallel 4
          --target BAAS_service_auth_crypto_tests BAAS_service_auth_owner_tests
          BAAS_service_websocket_handshake_tests BAAS_service_websocket_owner_tests
          BAAS_service_control_session_tests
          BAAS_service_business_session_tests
          BAAS_service_business_pipe_channel_tests
          BAAS_service_trigger_handler_tests
          BAAS_service_provider_backend_tests
          BAAS_service_remote_backend_tests
          BAAS_service_remote_backend_live_smoke
          BAAS_service_remote_handler_tests
          BAAS_service_adb_transport_tests
          BAAS_service_adb_sync_tests

      - name: Run service authentication tests
        run: >-
          ctest --test-dir build/service-auth
          --build-config ${{ matrix.build_type }}
          --output-on-failure
          --timeout 60
          -R "^BAAS_service_(auth_(crypto|owner)|websocket_(handshake|owner)|control_session|business_session|business_pipe_channel|trigger_handler|provider_backend|remote_(handler|backend)|adb_(transport|sync))_tests$"

  android-auth:
    name: Android ${{ matrix.abi }} / Release
    needs: host-auth
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - abi: arm64-v8a
            profile: android-clang-arm64-v8a-release
          - abi: x86_64
            profile: android-clang-x86_64-release

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes autoconf automake build-essential libtool ninja-build
          android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          test -n "${android_sdk}"
          sdkmanager 'ndk;29.0.13846066'
          test -d "${android_sdk}/ndk/29.0.13846066"
          echo "ANDROID_NDK_HOME=${android_sdk}/ndk/29.0.13846066" >> "$GITHUB_ENV"

      - name: Install Conan
        run: python -m pip install --disable-pip-version-check conan==2.30.0

      - name: Detect build profile
        run: conan profile detect --force

      - name: Cross-build and verify pinned libsodium recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-libsodium
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing
          --no-remote

      - name: Cross-build and verify pinned cpp-httplib recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-cpp-httplib
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing

      - name: Cross-build and verify pinned nlohmann-json recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-nlohmann-json
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing
          --no-remote

      - name: Cross-build and verify pinned miniz recipe
        shell: bash
        run: >-
          conan create deploy/conan/recipes/baas-miniz
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          --build=missing
          --no-remote

      - name: Generate Android control-auth CMake dependencies
        shell: bash
        run: >-
          conan install --requires=baas-libsodium/1.0.22
          --requires=baas-cpp-httplib/0.50.1
          --requires=baas-nlohmann-json/3.11.3
          --requires=baas-miniz/3.1.2
          -of build/conan/service-auth-android-${{ matrix.abi }}
          -pr:h=deploy/conan/profiles/${{ matrix.profile }}
          -pr:b=default
          -c:h "tools.android:ndk_path=${ANDROID_NDK_HOME}"
          -g CMakeDeps
          -g CMakeToolchain
          --build=missing
          --no-remote

      - name: Configure Android service authentication
        shell: bash
        run: >-
          cmake -S . -B build/service-auth-android-${{ matrix.abi }}
          "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/build/conan/service-auth-android-${{ matrix.abi }}/conan_toolchain.cmake"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DBUILD_SERVICE_AUTH_CRYPTO=ON
          -DBUILD_SERVICE_AUTH_CRYPTO_TESTS=OFF
          -DBUILD_SERVICE_AUTH_OWNER=ON
          -DBUILD_SERVICE_AUTH_OWNER_TESTS=OFF
          -DBUILD_SERVICE_CONTROL_SESSION=ON
          -DBUILD_SERVICE_CONTROL_SESSION_TESTS=OFF
          -DBUILD_SERVICE_BUSINESS_SESSION=ON
          -DBUILD_SERVICE_BUSINESS_SESSION_TESTS=OFF
          -DBUILD_SERVICE_ADB_DISCOVERY_TRIGGER=ON
          -DBUILD_SERVICE_FILE_RESOURCE_STORE=ON
          -DBUILD_SERVICE_CONFIGURATION_TRIGGERS=ON
          -DBUILD_SERVICE_RUNTIME_REPOSITORY_OWNER=ON
          -DBUILD_SERVICE_RUNTIME_CONFIGURATION_DEFAULTS=ON
          -DBUILD_SERVICE_PRODUCTION_HTTP_HOST_TESTS=ON
